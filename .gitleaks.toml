title = "Gitleaks config"

# Use Gitleaks' built-in default rules.
[extend]
useDefault = true

# Allowlist a historical leak that has been rotated and superseded.
# DEPLOYMENT.md committed an OpenSSH private key in commit dea1fa1f
# (Aug 2025). The key has been rotated; the documentation has been
# redacted. Scope to the specific commit so future leaks still trip.
[allowlist]
description = "Historical placeholder key in DEPLOYMENT.md (rotated)"
commits = ["dea1fa1f57c8ce2ce6a9b037e6edd626ff8bd0df"]
