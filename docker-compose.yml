version: '3.8'

services:
  app:
    build: .
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/lefv_db
      USE_SUPABASE: "false"
      LOG_LEVEL: info
      SESSION_SECRET: ${SESSION_SECRET:-change-this-in-production}
      # Weather API configuration
      AMBIENT_API_KEY: ${AMBIENT_API_KEY:-}
      AMBIENT_APP_KEY: ${AMBIENT_APP_KEY:-}
      AMBIENT_MAC_ADDRESS: ${AMBIENT_MAC_ADDRESS:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      OPENWEATHER_CITY: ${OPENWEATHER_CITY:-Paris}
      OPENWEATHER_COUNTRY: ${OPENWEATHER_COUNTRY:-FR}
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://lefv.io}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./client/src/content:/app/client/src/content:ro
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lefv_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # Optional: Redis for future rate limiting
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - app-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge